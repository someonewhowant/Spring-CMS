<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="${title}">Edit Course</title>
</head>
<body>
    <div layout:fragment="content" class="container py-l">
        <div class="admin-header">
            <h1 class="text-green font-mono" th:text="'teacher@cabinet:~/courses/' + ${course.id} + '/edit$'">teacher@cabinet:~/courses/1/edit$</h1>
            <div class="admin-actions">
                <a th:href="@{/teacher/courses}" class="btn btn-outline btn-orange">
                    <i class="bi bi-arrow-left"></i> back_to_courses()
                </a>
            </div>
        </div>

        <div class="post-form-container fade-in mt-xl">
            <h2 class="mb-xl text-orange font-mono text-l">
                <i class="bi bi-pencil"></i> edit_course()
            </h2>
            <form th:action="@{/teacher/edit-course/{id}(id=${course.id})}" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="title" class="form-label">// STRING: course_title</label>
                    <input type="text" id="title" name="title" th:value="${course.title}" placeholder="Introduction to Spring Boot..." class="form-control" required>
                </div>

                <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label for="level" class="form-label">// ENUM: difficulty_level</label>
                        <select id="level" name="level" class="form-control" required>
                            <option value="Beginner" th:selected="${course.level == 'Beginner'}">Beginner</option>
                            <option value="Intermediate" th:selected="${course.level == 'Intermediate'}">Intermediate</option>
                            <option value="Advanced" th:selected="${course.level == 'Advanced'}">Advanced</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="duration" class="form-label">// STRING: course_duration</label>
                        <input type="text" id="duration" name="duration" th:value="${course.duration}" placeholder="e.g., 10 hours" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="description" class="form-label">// STRING: course_description</label>
                    <textarea id="description" name="description" rows="3" placeholder="A comprehensive guide to learning..." class="form-control" required th:text="${course.description}"></textarea>
                </div>

                <div class="form-group" style="display: flex; gap: 16px; align-items: flex-start;">
                    <div th:if="${course.imageUrl}" style="flex-shrink: 0; width: 120px; height: 80px; border-radius: var(--radius-s); overflow: hidden; border: 1px solid var(--border-subtle);">
                        <img th:src="${course.imageUrl}" alt="Current Cover" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <div style="flex-grow: 1;">
                        <label for="image" class="form-label" style="color: var(--accent-blue);">// FILE: cover_image (PNG, JPG) - will overwrite current</label>
                        <input type="file" id="image" name="image" accept="image/*" class="form-control">
                    </div>
                </div>

                <div class="form-group">
                    <label for="markdownFile" class="form-label" style="color: var(--accent-blue);">// FILE: content_import (.md) - will overwrite intro content</label>
                    <input type="file" id="markdownFile" name="markdownFile" accept=".md" class="form-control">
                </div>

                <div class="form-group">
                    <label for="content" class="form-label" style="color: var(--accent-purple);">// TEXT: course_introduction (markdown)</label>
                    <textarea id="content" name="content" rows="15" placeholder="## Welcome..." class="form-control" th:text="${course.content}"></textarea>
                </div>

                <div style="margin-top: 32px;">
                    <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                        <i class="bi bi-terminal"></i> update_course()
                    </button>
                </div>
            </form>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
        <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
        <script>
            const easyMDE = new EasyMDE({
                element: document.getElementById('content'),
                spellChecker: false,
                autosave: {
                    enabled: true,
                    uniqueId: "teacherEditCourseContent_" + [[${course.id}]],
                    delay: 1000,
                },
                placeholder: "## Welcome to the Course...",
                minHeight: "400px"
            });
        </script>
        <style>
            .EasyMDEContainer { background: var(--bg-dark); border-radius: var(--radius); margin-top: 8px; }
            .editor-toolbar { border-color: var(--border-subtle) !important; background: var(--bg-surface) !important; border-radius: var(--radius) var(--radius) 0 0 !important; }
            .editor-toolbar button { color: var(--text-main) !important; }
            .editor-toolbar button:hover, .editor-toolbar button.active { background: var(--bg-dark) !important; border-color: var(--border-active) !important; }
            .CodeMirror { background: var(--bg-dark) !important; color: var(--text-main) !important; border-color: var(--border-subtle) !important; border-radius: 0 0 var(--radius) var(--radius) !important; font-family: var(--font-mono) !important; }
            .editor-preview-active { background: var(--bg-dark) !important; color: var(--text-main) !important; }
            .editor-statusbar { color: var(--text-dim) !important; }
        </style>
    </th:block>
</body>
</html>
