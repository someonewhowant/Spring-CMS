<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>My Bookmarks</title>
</head>
<body>
    <div layout:fragment="content" class="container py-l fade-in">
        
        <div class="profile-layout" style="display: grid; grid-template-columns: 280px 1fr; gap: 32px; align-items: start;">
            
            <!-- Sidebar Navigation -->
            <aside class="profile-sidebar card-glass" style="padding: 24px;">
                <div class="profile-sidebar__user" style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);">
                    <div style="width: 48px; height: 48px; border-radius: 50%; overflow: hidden; border: 2px solid var(--accent-blue);">
                        <img th:if="${user.avatarUrl != null}" th:src="${user.avatarUrl}" alt="Avatar" style="width: 100%; height: 100%; object-fit: cover;">
                        <div th:unless="${user.avatarUrl != null}" style="width: 100%; height: 100%; background: var(--bg-surface); display: flex; align-items: center; justify-content: center; color: var(--text-dim);">
                            <i class="bi bi-person-fill"></i>
                        </div>
                    </div>
                    <div>
                        <div style="font-weight: 600; color: var(--text-main); font-size: 1rem;" th:text="${user.username}">Username</div>
                        <div style="font-size: 0.8rem; color: var(--text-dim);" th:text="${user.role}">Role</div>
                    </div>
                </div>

                <nav style="display: flex; flex-direction: column; gap: 8px;">
                    <a th:href="@{/profile/settings}" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius); color: var(--text-dim); text-decoration: none; transition: all 0.2s;">
                        <i class="bi bi-gear"></i> Settings
                    </a>
                    <a th:href="@{/profile/bookmarks}" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius); background: rgba(88, 166, 255, 0.1); color: var(--accent-blue); font-weight: 600; text-decoration: none; transition: all 0.2s;">
                        <i class="bi bi-bookmark-fill"></i> Bookmarks
                    </a>
                    <a th:href="@{/profile/u/{username}(username=${user.username})}" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius); color: var(--text-dim); text-decoration: none; transition: all 0.2s;">
                        <i class="bi bi-person-badge"></i> Public Profile
                    </a>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="profile-main">
                <div class="card-glass" style="padding: 32px;">
                    <h1 class="font-mono" style="font-size: 1.5rem; margin-bottom: 24px; color: var(--text-main); display: flex; align-items: center; gap: 12px;">
                        <i class="bi bi-bookmarks text-blue"></i> Saved Items
                    </h1>

                    <div th:if="${#lists.isEmpty(bookmarks)}" class="text-center py-2xl w-full">
                        <i class="bi bi-inbox" style="font-size: 3rem; color: var(--text-dim); display: block; margin-bottom: var(--space-m);"></i>
                        <p class="text-dim">No bookmarks yet. Save articles or courses to find them here later!</p>
                    </div>

                    <div th:if="${not #lists.isEmpty(bookmarks)}" style="display: grid; gap: 16px;">
                        <div th:each="bookmark : ${bookmarks}" class="card-glass" style="padding: 20px; display: flex; justify-content: space-between; align-items: center; gap: 16px; position: relative; transition: all 0.2s;">
                            
                            <div th:if="${bookmark.post != null}" style="flex: 1;">
                                <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                                    <span style="font-family: var(--font-mono); font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; background: rgba(88, 166, 255, 0.1); color: var(--accent-blue);">ARTICLE</span>
                                </div>
                                <h3 style="margin: 0 0 8px; font-size: 1.1rem;">
                                    <a th:href="@{/post/{id}(id=${bookmark.post.id})}" class="stretched-link" th:text="${bookmark.post.title}" style="color: var(--text-main); text-decoration: none;">Title</a>
                                </h3>
                                <p style="margin: 0; font-size: 0.85rem; color: var(--text-dim);" th:text="${#temporals.format(bookmark.createdAt, 'MMM dd, yyyy HH:mm')}">Date</p>
                            </div>
                            
                            <div th:if="${bookmark.course != null}" style="flex: 1;">
                                <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                                    <span style="font-family: var(--font-mono); font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; background: rgba(188, 140, 255, 0.1); color: var(--accent-purple);">COURSE</span>
                                </div>
                                <h3 style="margin: 0 0 8px; font-size: 1.1rem;">
                                    <a th:href="@{/course/{id}(id=${bookmark.course.id})}" class="stretched-link" th:text="${bookmark.course.title}" style="color: var(--text-main); text-decoration: none;">Title</a>
                                </h3>
                                <p style="margin: 0; font-size: 0.85rem; color: var(--text-dim);" th:text="${#temporals.format(bookmark.createdAt, 'MMM dd, yyyy HH:mm')}">Date</p>
                            </div>

                            <div style="flex-shrink: 0; position: relative; z-index: 2;">
                                <form th:if="${bookmark.post != null}" th:action="@{/bookmark/post/{id}(id=${bookmark.post.id})}" method="post">
                                    <button type="submit" class="btn btn-outline" style="padding: 6px 12px; color: #ff7b72; border-color: rgba(255, 123, 114, 0.3);">
                                        <i class="bi bi-trash"></i> Remove
                                    </button>
                                </form>
                                <form th:if="${bookmark.course != null}" th:action="@{/bookmark/course/{id}(id=${bookmark.course.id})}" method="post">
                                    <button type="submit" class="btn btn-outline" style="padding: 6px 12px; color: #ff7b72; border-color: rgba(255, 123, 114, 0.3);">
                                        <i class="bi bi-trash"></i> Remove
                                    </button>
                                </form>
                            </div>

                        </div>
                    </div>

                </div>
            </main>
        </div>
    </div>
</body>
</html>
