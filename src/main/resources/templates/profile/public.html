<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="${profileUser.username} + ' - Public Profile'">Public Profile</title>
</head>
<body>
    <div layout:fragment="content" class="container py-l fade-in">
        <!-- Terminal Header -->
        <div class="admin-header" style="margin-bottom: 32px;">
            <div>
                <h1 class="text-green font-mono" style="font-size: 1.8rem; margin: 0 0 4px;">user_profile_view.sh</h1>
                <p class="font-mono text-dim" style="font-size: 0.85rem; margin: 0;">Public profile for: <span class="text-blue" th:text="${profileUser.username}">student</span></p>
            </div>
            <div class="admin-actions">
                <a th:href="@{/leaderboard}" class="btn btn-outline btn-xs" style="border-color: var(--border-subtle);">
                    <i class="bi bi-chevron-left"></i> back_to_leaderboard()
                </a>
            </div>
        </div>

        <div class="row g-4">
            <!-- Left Column: Avatar & Basic Info -->
            <div class="col-md-4">
                <div class="card-glass" style="padding: clamp(1.5rem, 3vw, 2rem); display: flex; flex-direction: column; align-items: center; text-align: center; background: linear-gradient(135deg, rgba(88, 166, 255, 0.05) 0%, rgba(188, 140, 255, 0.05) 100%);">
                    <img th:if="${profileUser.avatarUrl != null}" th:src="${profileUser.avatarUrl}" style="width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent-blue); box-shadow: 0 0 20px rgba(88, 166, 255, 0.2); margin-bottom: 20px;">
                    <div th:if="${profileUser.avatarUrl == null}" class="avatar-circle" style="width: 140px; height: 140px; border-radius: 50%; font-size: 3.5rem; display: flex; align-items: center; justify-content: center; border: 3px solid var(--border-subtle); background: var(--bg-body); margin-bottom: 20px;" th:text="${profileUser.fullName != null and #strings.length(profileUser.fullName) > 0 ? #strings.substring(profileUser.fullName, 0, 1).toUpperCase() : #strings.substring(profileUser.username, 0, 1).toUpperCase()}">U</div>
                    
                    <h2 class="text-green font-mono" style="font-size: 1.6rem; margin: 0 0 8px;" th:text="${profileUser.fullName != null and profileUser.fullName != '' ? profileUser.fullName : profileUser.username}">Student Name</h2>
                    <div class="font-mono text-blue" style="font-size: 0.95rem; margin-bottom: 16px;" th:text="'@' + ${profileUser.username}">@username</div>
                    
                    <span th:if="${profileUser.lmsStatus != null}" class="profile-role-badge" style="background: rgba(188, 140, 255, 0.15); color: var(--accent-purple); border: 1px solid rgba(188, 140, 255, 0.4); font-size: 0.8rem; padding: 6px 16px; border-radius: 20px; font-weight: 600; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.05em;" th:text="${profileUser.lmsStatus}">MASTER CATCHER</span>
                    <span th:if="${profileUser.lmsStatus == null}" class="profile-role-badge" style="background: rgba(56, 139, 253, 0.15); color: var(--accent-blue); border: 1px solid rgba(56, 139, 253, 0.4); font-size: 0.8rem; padding: 6px 16px; border-radius: 20px; font-weight: 600; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.05em;">ACADEMY STUDENT</span>

                    <!-- Level and XP -->
                    <div style="width: 100%; text-align: left; background: rgba(0,0,0,0.2); padding: 16px; border-radius: 12px; border: 1px solid var(--border-subtle);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span class="text-dim font-mono" style="font-size: 0.85rem;">Level <span class="text-main" th:text="${profileUser.level}">1</span></span>
                            <span class="text-accent-blue font-mono fw-bold" style="font-size: 0.85rem;" th:text="${profileUser.experiencePoints} + ' XP'">0 XP</span>
                        </div>
                        <div style="width: 100%; height: 8px; background: rgba(255, 255, 255, 0.05); border-radius: 4px; overflow: hidden;">
                            <div th:style="'width: ' + (${profileUser.experiencePoints} % 100) + '%; height: 100%; background: var(--accent-blue);'"></div>
                        </div>
                        <p class="text-dim mt-2 mb-0" style="font-size: 0.75rem; text-align: center;" th:text="'Next level at ' + ((${profileUser.level} * 100) + 100) + ' XP'">Next level at 200 XP</p>
                    </div>

                    <div style="display: flex; gap: 12px; margin-top: 24px; width: 100%;">
                        <a th:if="${profileUser.githubUrl != null and profileUser.githubUrl != ''}" th:href="${profileUser.githubUrl}" target="_blank" class="btn btn-outline" style="flex: 1; border-radius: 8px;"><i class="bi bi-github"></i> GitHub</a>
                        <a th:if="${profileUser.linkedinUrl != null and profileUser.linkedinUrl != ''}" th:href="${profileUser.linkedinUrl}" target="_blank" class="btn btn-outline" style="flex: 1; border-radius: 8px;"><i class="bi bi-linkedin"></i> LinkedIn</a>
                    </div>
                </div>
            </div>

            <!-- Right Column: Bio & Achievements -->
            <div class="col-md-8">
                <div class="card-glass" style="padding: clamp(1.5rem, 3vw, 2.5rem); margin-bottom: 24px;">
                    <h3 class="font-mono text-dim" style="font-size: 0.9rem; text-transform: uppercase; margin-bottom: 16px; letter-spacing: 0.08em; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 8px;">
                        <i class="bi bi-person-lines-fill"></i> user_bio.txt
                    </h3>
                    <p style="margin: 0; opacity: 0.85; font-family: var(--font-mono); font-size: 0.95rem; color: var(--text-main); line-height: 1.6; white-space: pre-wrap;" th:text="${profileUser.bio != null and profileUser.bio != '' ? profileUser.bio : 'No biography provided.'}">Student bio...</p>
                </div>

                <div class="card-glass" style="padding: clamp(1.5rem, 3vw, 2.5rem);">
                    <h3 class="font-mono text-dim" style="font-size: 0.9rem; text-transform: uppercase; margin-bottom: 24px; letter-spacing: 0.08em; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 8px;">
                        <i class="bi bi-trophy"></i> unlocked_achievements.json
                    </h3>
                    
                    <div th:if="${#lists.isEmpty(profileUser.achievements)}" class="text-dim text-center" style="padding: 32px 0;">
                        <i class="bi bi-shield-slash" style="font-size: 2.5rem; opacity: 0.5; margin-bottom: 12px; display: inline-block;"></i>
                        <p class="font-mono" style="margin: 0; font-size: 0.9rem;">No achievements unlocked yet.</p>
                    </div>

                    <div th:if="${!#lists.isEmpty(profileUser.achievements)}" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
                        <div th:each="badge : ${profileUser.achievements}" style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-subtle); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 16px; transition: transform 0.2s ease, box-shadow 0.2s ease;" onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 4px 12px rgba(88,166,255,0.1)'" onmouseout="this.style.transform='none'; this.style.boxShadow='none'">
                            <div style="width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, rgba(88,166,255,0.2) 0%, rgba(188,140,255,0.2) 100%); display: flex; align-items: center; justify-content: center; border: 1px solid rgba(188,140,255,0.5);">
                                <i class="bi bi-award-fill text-purple" style="font-size: 1.5rem;"></i>
                            </div>
                            <div style="flex: 1;">
                                <h4 class="text-main m-0" style="font-size: 0.9rem; font-weight: 600; line-height: 1.2;" th:text="${badge}">Badge Name</h4>
                                <span class="text-dim" style="font-size: 0.7rem; font-family: var(--font-mono);">UNLOCKED</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
