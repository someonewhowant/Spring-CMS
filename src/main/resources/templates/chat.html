<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/main}">

<head>
    <title>Chat - CodeBlog Academy</title>
    <link rel="stylesheet" th:href="@{/css/chat.css}" />
</head>

<body>
    <div layout:fragment="content" class="container">
        <div class="chat-container">
            <aside class="chat-sidebar">
                <div class="chat-sidebar-header">
                    <h2 th:text="${currentUserObj.role == T(com.example.blog.entity.Role).STUDENT ? '■ MENTORS' : '■ STUDENTS'}">■ CHATS</h2>
                    <div id="connection-status" style="font-size: 0.65rem; font-family: var(--font-mono); margin-top: 8px; letter-spacing: 1px;">
                        STATUS: <span id="status-text" class="text-dim">INITIALIZING...</span>
                    </div>
                </div>
                <div class="chat-partners-list">
                    <div th:each="partner : ${chatPartners}" 
                         class="chat-partner-item" 
                         th:classappend="${activePartnerId == partner.id ? 'active' : ''}"
                         th:onclick="'selectPartner(' + ${partner.id} + ')'"
                         th:id="'partner-' + ${partner.id}">
                        <img th:src="${partner.avatarUrl != null ? partner.avatarUrl : '/img/hero-image.webp'}" class="chat-partner-avatar" alt="">
                        <div class="chat-partner-info">
                            <span class="chat-partner-name" th:text="${partner.fullName}">Partner Name</span>
                            <span class="chat-partner-status" th:text="${partner.title != null ? partner.title : (partner.role == T(com.example.blog.entity.Role).TEACHER ? 'Mentor' : 'Student')}">Status</span>
                        </div>
                        <span th:if="${unreadCounts.get(partner.id) > 0}" 
                              class="unread-badge" 
                              th:text="${unreadCounts.get(partner.id)}"
                              th:id="'unread-' + ${partner.id}">3</span>
                    </div>
                    <div th:if="${#lists.isEmpty(chatPartners)}" class="text-center p-4 text-dim font-mono" style="font-size: 0.8rem;">
                        ↳ NO_CONTACTS_FOUND
                    </div>
                </div>
            </aside>

            <main class="chat-main">
                <div id="chat-content" style="display: none;">
                    <div class="chat-main-header">
                        <div class="header-info">
                            <img id="active-partner-avatar" src="" class="chat-partner-avatar" style="width: 38px; height: 38px;" alt="">
                            <div>
                                <span id="active-partner-name" class="chat-partner-name">Partner Name</span>
                                <span id="active-partner-status" class="chat-partner-status">Online</span>
                            </div>
                        </div>
                        <button class="btn-clear" onclick="clearHistory()">
                            <i class="bi bi-trash3"></i> CLEAR_HISTORY
                        </button>
                    </div>

                    <div class="chat-messages" id="message-container"></div>

                    <form class="chat-input-area" id="chat-form">
                        <input type="hidden" id="recipient-id" value="">
                        <div class="chat-input-wrapper">
                            <input type="text" id="message-input" class="chat-input" placeholder="Type a message..." autocomplete="off">
                        </div>
                        <button type="submit" class="chat-send-btn">
                            <i class="bi bi-send-fill" style="font-size: 1.2rem;"></i>
                        </button>
                    </form>
                </div>

                <div id="no-chat-placeholder" class="no-chat-selected">
                    <i class="bi bi-chat-dots" style="font-size: 3rem; margin-bottom: 16px; opacity: 0.3;"></i>
                    <p class="font-mono" style="letter-spacing: 2px; font-size: 0.8rem;">[ SELECT_CONVERSATION_TO_START ]</p>
                </div>
            </main>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
        <script th:inline="javascript">
            /*<![CDATA[*/
            let activePartnerId = /*[[${activePartnerId}]]*/ null;
            const currentUserId = /*[[${currentUserObj.id}]]*/ null;
            let stompClient = null;
            let messagesList = [];
            let pollTimer = null;

            async function clearHistory() {
                if (!activePartnerId) return;
                if (!confirm("Are you sure you want to clear the message history? This action cannot be undone.")) return;

                const formData = new FormData();
                formData.append('partnerId', activePartnerId);

                try {
                    await fetch('/api/chat/clear', {
                        method: 'POST',
                        body: formData
                    });
                    messagesList = [];
                    renderMessages([]);
                } catch (error) {
                    console.error('Error clearing history:', error);
                }
            }

            function connect() {
                const statusText = document.getElementById('status-text');
                statusText.innerText = 'CONNECTING...';
                statusText.className = 'text-dim';

                const socket = new SockJS('/ws');
                stompClient = Stomp.over(socket);
                stompClient.debug = null; 

                stompClient.connect({}, function (frame) {
                    statusText.innerText = 'ONLINE (WS)';
                    statusText.className = 'text-green';
                    if (pollTimer) clearInterval(pollTimer);

                    stompClient.subscribe('/user/queue/messages', function (message) {
                        const msg = JSON.parse(message.body);
                        handleIncomingMessage(msg);
                    });
                }, function(error) {
                    statusText.innerText = 'OFFLINE (POLLING...)';
                    statusText.className = 'text-purple';
                    startPolling();
                    setTimeout(connect, 10000);
                });
            }

            function startPolling() {
                if (pollTimer) clearInterval(pollTimer);
                pollTimer = setInterval(() => {
                    if (activePartnerId) {
                        loadMessages(activePartnerId);
                    }
                    fetchUnreadCounts();
                }, 4000);
            }

            async function fetchUnreadCounts() {
                try {
                    const response = await fetch('/api/chat/unread-counts');
                    const counts = await response.json();
                    for (const [id, count] of Object.entries(counts)) {
                        if (id != activePartnerId && count > 0) {
                            let badge = document.getElementById('unread-' + id);
                            if (badge) {
                                badge.innerText = count;
                                badge.style.display = 'block';
                            }
                        }
                    }
                } catch (error) {}
            }

            function handleIncomingMessage(msg) {
                if (msg.senderId == activePartnerId || msg.senderId == currentUserId) {
                    if (!messagesList.some(m => m.id === msg.id)) {
                        messagesList.push(msg);
                        renderMessages(messagesList);
                    }
                    if (msg.senderId == activePartnerId) {
                        fetch('/api/chat/messages/' + activePartnerId);
                    }
                } else {
                    let badge = document.getElementById('unread-' + msg.senderId);
                    if (badge) {
                        const currentCount = parseInt(badge.innerText || '0');
                        badge.innerText = currentCount + 1;
                        badge.style.display = 'block';
                    }
                }
            }

            function selectPartner(id) {
                activePartnerId = id;
                document.querySelectorAll('.chat-partner-item').forEach(el => el.classList.remove('active'));
                const partnerEl = document.getElementById('partner-' + id);
                if (partnerEl) {
                    partnerEl.classList.add('active');
                    document.getElementById('no-chat-placeholder').style.display = 'none';
                    document.getElementById('chat-content').style.display = 'flex';
                    document.getElementById('active-partner-name').innerText = partnerEl.querySelector('.chat-partner-name').innerText;
                    document.getElementById('active-partner-avatar').src = partnerEl.querySelector('.chat-partner-avatar').src;
                    document.getElementById('active-partner-status').innerText = partnerEl.querySelector('.chat-partner-status').innerText;
                    document.getElementById('recipient-id').value = id;
                    const unreadBadge = document.getElementById('unread-' + id);
                    if (unreadBadge) unreadBadge.style.display = 'none';
                    loadMessages(id);
                    const newUrl = window.location.pathname + '?with=' + id;
                    window.history.pushState({path: newUrl}, '', newUrl);
                }
            }

            async function loadMessages(partnerId) {
                try {
                    const response = await fetch('/api/chat/messages/' + partnerId);
                    const newMessages = await response.json();
                    if (newMessages.length !== messagesList.length || JSON.stringify(newMessages) !== JSON.stringify(messagesList)) {
                        messagesList = newMessages;
                        renderMessages(messagesList);
                    }
                } catch (error) {
                    console.error('Error loading messages:', error);
                }
            }

            function formatTime(timestamp) {
                if (!timestamp) return '';
                try {
                    const date = new Date(parseInt(timestamp));
                    return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                } catch (e) {
                    return timestamp;
                }
            }

            function renderMessages(messages) {
                const container = document.getElementById('message-container');
                if (!container) return;
                const isScrolledToBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 100;
                
                // Clear existing messages
                container.innerHTML = '';
                
                // Append messages safely as DOM nodes
                messages.forEach(msg => {
                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message ' + (msg.senderId === currentUserId ? 'message-sent' : 'message-received');
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'message-content';
                    contentDiv.textContent = msg.content;
                    
                    const timeSpan = document.createElement('span');
                    timeSpan.className = 'message-time';
                    timeSpan.textContent = formatTime(msg.timestamp);
                    
                    msgDiv.appendChild(contentDiv);
                    msgDiv.appendChild(timeSpan);
                    container.appendChild(msgDiv);
                });
                
                if (isScrolledToBottom) {
                    container.scrollTop = container.scrollHeight;
                }
            }

            document.getElementById('chat-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const input = document.getElementById('message-input');
                const content = input.value.trim();
                const recipientId = document.getElementById('recipient-id').value;
                if (!content) return;
                const formData = new FormData();
                formData.append('recipientId', recipientId);
                formData.append('content', content);
                input.value = '';
                try {
                    await fetch('/api/chat/send', {
                        method: 'POST',
                        body: formData
                    });
                    // Refresh immediately after sending
                    loadMessages(recipientId);
                } catch (error) {
                    console.error('Error sending message:', error);
                }
            });

            connect();
            startPolling(); // Start polling immediately as fallback
            if (activePartnerId) {
                selectPartner(activePartnerId);
            }

            setInterval(async () => {
                if (stompClient && stompClient.connected) return;
                fetchUnreadCounts();
            }, 10000);
            /*]]>*/
        </script>
    </th:block>
</body>

</html>
