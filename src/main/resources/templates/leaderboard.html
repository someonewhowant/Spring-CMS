<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Leaderboard - CodeBlog</title>
</head>
<body>
<div layout:fragment="content" class="container py-l fade-in">
    <!-- Header -->
    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px;">
        <div>
            <h1 style="font-size: 2.5rem; margin: 0 0 8px; font-weight: 800; letter-spacing: -0.02em;">Academy <span class="text-gradient-green">Leaderboard</span></h1>
            <p class="font-mono text-dim" style="margin: 0; font-size: 0.95rem;">■ TOP_STUDENTS_BY_EXPERIENCE_POINTS</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-12">
            <div class="card-glass" style="padding: 0; overflow: hidden; border: 1px solid rgba(88, 166, 255, 0.15);">
                <div class="table-responsive">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead class="font-mono text-dim" style="background: rgba(0,0,0,0.2); border-bottom: 1px solid var(--border-subtle);">
                        <tr>
                            <th style="padding: 16px 24px; text-align: center; width: 80px; font-weight: 500;">RANK</th>
                            <th style="padding: 16px 24px; text-align: left; font-weight: 500;">STUDENT</th>
                            <th style="padding: 16px 24px; text-align: center; font-weight: 500;">STATUS</th>
                            <th style="padding: 16px 24px; text-align: center; font-weight: 500;">LEVEL</th>
                            <th style="padding: 16px 24px; text-align: right; font-weight: 500;">XP</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="student, stat : ${topStudents}" style="border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.2s ease;" onmouseover="this.style.background='rgba(88, 166, 255, 0.03)'" onmouseout="this.style.background='transparent'">
                            <!-- Rank -->
                            <td style="padding: 16px 24px; text-align: center;">
                                <div th:if="${stat.index == 0}" style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #ffd700 0%, #d4af37 100%); display: flex; align-items: center; justify-content: center; margin: 0 auto; color: #000; font-weight: 700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);">
                                    1
                                </div>
                                <div th:if="${stat.index == 1}" style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #e0e0e0 0%, #a0a0a0 100%); display: flex; align-items: center; justify-content: center; margin: 0 auto; color: #000; font-weight: 700; box-shadow: 0 0 15px rgba(192, 192, 192, 0.4);">
                                    2
                                </div>
                                <div th:if="${stat.index == 2}" style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #cd7f32 0%, #a0522d 100%); display: flex; align-items: center; justify-content: center; margin: 0 auto; color: #fff; font-weight: 700; box-shadow: 0 0 15px rgba(205, 127, 50, 0.4);">
                                    3
                                </div>
                                <div th:if="${stat.index > 2}" class="text-dim font-mono" style="font-weight: 600; font-size: 1.1rem;">
                                    <span th:text="${stat.index + 1}">4</span>
                                </div>
                            </td>
                            
                            <!-- Student Profile Link -->
                            <td style="padding: 16px 24px;">
                                <a th:href="@{/profile/u/{username}(username=${student.username})}" style="text-decoration: none; display: flex; align-items: center; gap: 16px; transition: transform 0.2s ease;" onmouseover="this.style.transform='translateX(4px)'" onmouseout="this.style.transform='none'">
                                    <img th:if="${student.avatarUrl != null}" th:src="${student.avatarUrl}" style="width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(88, 166, 255, 0.5); background: var(--bg-body);">
                                    <div th:if="${student.avatarUrl == null}" class="avatar-circle" style="width: 48px; height: 48px; border-radius: 50%; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(88, 166, 255, 0.3); background: linear-gradient(135deg, rgba(88,166,255,0.1) 0%, rgba(188,140,255,0.1) 100%); color: var(--text-main); font-weight: 600;" th:text="${student.fullName != null and #strings.length(student.fullName) > 0 ? #strings.substring(student.fullName, 0, 1).toUpperCase() : #strings.substring(student.username, 0, 1).toUpperCase()}">U</div>
                                    
                                    <div>
                                        <h6 style="margin: 0 0 2px; color: var(--text-main); font-size: 1.05rem; font-weight: 600;" th:text="${student.fullName != null and student.fullName != '' ? student.fullName : student.username}">John Doe</h6>
                                        <small class="text-blue font-mono" th:text="'@' + ${student.username}">@johndoe</small>
                                    </div>
                                </a>
                            </td>

                            <!-- LMS Status -->
                            <td style="padding: 16px 24px; text-align: center;">
                                <span th:if="${student.lmsStatus != null}" class="badge" style="background: rgba(188, 140, 255, 0.15); color: #bc8cff; border: 1px solid rgba(188, 140, 255, 0.4); font-size: 0.7rem; font-weight: 600; padding: 4px 10px; border-radius: 12px; text-transform: uppercase;" th:text="${student.lmsStatus}">MASTER</span>
                                <span th:if="${student.lmsStatus == null}" class="badge" style="background: rgba(56, 139, 253, 0.15); color: #58a6ff; border: 1px solid rgba(56, 139, 253, 0.4); font-size: 0.7rem; font-weight: 600; padding: 4px 10px; border-radius: 12px;">ACTIVE</span>
                            </td>

                            <!-- Level -->
                            <td style="padding: 16px 24px; text-align: center;">
                                <div style="display: inline-flex; align-items: center; justify-content: center; background: rgba(63, 185, 80, 0.1); border: 1px solid rgba(63, 185, 80, 0.3); color: var(--accent-green); border-radius: 6px; padding: 4px 12px; font-family: var(--font-mono); font-size: 0.85rem; font-weight: 600;">
                                    Lvl <span th:text="${student.level}" style="margin-left: 4px;">5</span>
                                </div>
                            </td>

                            <!-- XP -->
                            <td style="padding: 16px 24px; text-align: right;">
                                <span class="text-accent-blue font-mono fw-bold" style="font-size: 1.05rem;" th:text="${student.experiencePoints} + ' XP'">1250 XP</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(topStudents)}">
                            <td colspan="5" style="text-align: center; padding: 48px; color: var(--text-dim); font-family: var(--font-mono);">
                                [ NO_STUDENT_RECORDS_FOUND ]
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
