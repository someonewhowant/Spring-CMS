<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Sign In — CodeBlog Academy</title>
</head>
<body>
    <div layout:fragment="content" class="fade-in">

        <!-- Animated Background Orbs -->
        <div class="auth-orb auth-orb--blue"></div>
        <div class="auth-orb auth-orb--purple"></div>
        <div class="auth-orb auth-orb--green"></div>

        <div class="auth-wrapper">
            <div class="auth-card">
                <!-- Top glow effect -->
                <div class="auth-card__glow"></div>

                <!-- Header -->
                <div class="auth-header">
                    <div class="auth-header__icon">
                        <i class="bi bi-person-circle"></i>
                    </div>
                    <h1 class="auth-header__title">Welcome Back</h1>
                    <p class="auth-header__subtitle">Sign in to continue your learning journey</p>
                </div>

                <!-- Error Alert -->
                <div th:if="${param.error}" class="auth-alert auth-alert--error">
                    <i class="bi bi-exclamation-circle"></i>
                    Invalid username or password. Please try again.
                </div>

                <!-- Success Alert -->
                <div th:if="${param.registered}" class="auth-alert auth-alert--success">
                    <i class="bi bi-check-circle"></i>
                    Account created successfully! Please sign in.
                </div>

                <!-- Login Form -->
                <form th:action="@{/admin/login}" method="POST">
                    <div class="auth-input-group">
                        <label class="auth-input-group__label">Username</label>
                        <div class="auth-input-group__field">
                            <input type="text" name="username" placeholder="Enter your username"
                                   class="auth-input-group__input" required autocomplete="username">
                            <i class="bi bi-person auth-input-group__icon"></i>
                        </div>
                    </div>

                    <div class="auth-input-group">
                        <label class="auth-input-group__label">Password</label>
                        <div class="auth-input-group__field">
                            <input type="password" name="password" placeholder="Enter your password"
                                   class="auth-input-group__input" required autocomplete="current-password">
                            <i class="bi bi-lock auth-input-group__icon"></i>
                        </div>
                    </div>

                    <div style="margin-top: 28px;">
                        <button type="submit" class="auth-btn auth-btn--primary">
                            <i class="bi bi-box-arrow-in-right"></i> Sign In
                        </button>
                    </div>
                </form>

                <!-- Footer Links -->
                <div class="auth-footer">
                    <p style="font-size: 0.9rem; color: var(--text-dim); margin-bottom: 16px;">
                        Don't have an account?
                        <a th:href="@{/register}" class="auth-link--highlight">Sign up</a>
                    </p>
                    <a th:href="@{/}" class="auth-link">
                        <i class="bi bi-arrow-left"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
