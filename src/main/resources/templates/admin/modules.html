<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="${title}">Manage Modules</title>
</head>
<body>
    <div layout:fragment="content" class="container py-l">
        <div class="admin-header">
            <h1 th:text="'root@admin:~/courses/' + ${course.id} + '/modules$'">root@admin:~/courses/1/modules$</h1>
            <div class="admin-actions">
                <a th:href="@{/admin/courses}" class="btn btn-outline btn-orange">
                    <i class="bi bi-arrow-left"></i> back_to_courses()
                </a>
            </div>
        </div>

        <div class="admin-table-wrapper mb-xl">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>ORDER</th>
                        <th>MODULE_TITLE</th>
                        <th>QUIZ_ASSOCIATION</th>
                        <th style="text-align: right;">ACTIONS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="module : ${modules}">
                        <td th:text="${module.orderIndex}">0</td>
                        <td th:text="${module.title}">Module Title</td>
                        <td>
                            <form th:action="@{/admin/courses/{courseId}/modules/{moduleId}/quiz(courseId=${course.id}, moduleId=${module.id})}" 
                                  method="POST" style="display: flex; gap: 8px;">
                                <select name="quizId" class="form-control" style="padding: 4px 8px; font-size: 0.8rem; height: 32px; min-width: 150px;">
                                    <option value="">-- No Quiz --</option>
                                    <option th:each="q : ${quizzes}" 
                                            th:value="${q.id}" 
                                            th:text="${q.title}"
                                            th:selected="${module.quiz != null and module.quiz.id == q.id}">
                                        Quiz Title
                                    </option>
                                </select>
                                <button type="submit" class="btn btn-outline btn-xs btn-blue">
                                    UPDATE
                                </button>
                                <a th:href="@{/admin/courses/{courseId}/modules/{moduleId}/edit(courseId=${course.id}, moduleId=${module.id})}" 
                                   class="btn btn-outline btn-xs btn-orange">
                                    EDIT
                                </a>
                            </form>
                        </td>
                        <td style="text-align: right;">
                            <a th:href="@{/admin/delete-module/{courseId}/{moduleId}(courseId=${course.id}, moduleId=${module.id})}" 
                               class="btn btn-outline btn-delete btn-xs" 
                               onclick="return confirm('rm -rf this_module?')">
                                <i class="bi bi-trash3"></i> DELETE
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(modules)}">
                        <td colspan="3" style="text-align: center; padding: 40px; color: var(--text-dim);">
                            No modules found. Use the form below to upload_module().
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="post-form-container fade-in mt-3xl">
            <h2 class="mb-xl text-green font-mono text-l">
                <i class="bi bi-plus-lg"></i> upload_new_module()
            </h2>
            <form th:action="@{/admin/courses/{id}/modules(id=${course.id})}" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="title" class="form-label">// STRING: module_title</label>
                    <input type="text" id="title" name="title" placeholder="Introduction to Spring Boot..." class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="file" class="form-label" style="color: var(--accent-blue);">// FILE: content_import (.md)</label>
                    <input type="file" id="file" name="file" accept=".md" class="form-control">
                </div>

                <div class="form-group">
                    <label for="content" class="form-label" style="color: var(--accent-purple);">// TEXT: module_content (markdown)</label>
                    <textarea id="content" name="content" rows="10" placeholder="## Welcome..." class="form-control"></textarea>
                </div>

                <div style="margin-top: 32px;">
                    <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                        <i class="bi bi-terminal"></i> upload_module()
                    </button>
                </div>
            </form>
        </div>
    </div>

    <th:block layout:fragment="scripts">
        <link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
        <script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>
        <script>
            const easyMDE = new EasyMDE({
                element: document.getElementById('content'),
                spellChecker: false,
                autosave: {
                    enabled: true,
                    uniqueId: "moduleContent",
                    delay: 1000,
                },
                placeholder: "## Welcome...",
                minHeight: "400px"
            });
        </script>
        <style>
            .EasyMDEContainer { background: var(--bg-dark); border-radius: var(--radius); margin-top: 8px; }
            .editor-toolbar { border-color: var(--border-subtle) !important; background: var(--bg-surface) !important; border-radius: var(--radius) var(--radius) 0 0 !important; }
            .editor-toolbar button { color: var(--text-main) !important; }
            .editor-toolbar button:hover, .editor-toolbar button.active { background: var(--bg-dark) !important; border-color: var(--border-active) !important; }
            .CodeMirror { background: var(--bg-dark) !important; color: var(--text-main) !important; border-color: var(--border-subtle) !important; border-radius: 0 0 var(--radius) var(--radius) !important; font-family: var(--font-mono) !important; }
            .editor-preview-active { background: var(--bg-dark) !important; color: var(--text-main) !important; }
            .editor-statusbar { color: var(--text-dim) !important; }
        </style>
    </th:block>
</body>
</html>
