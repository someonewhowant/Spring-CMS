<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="${title}">Articles — CodeBlog</title>
</head>
<body>

    <div layout:fragment="content">
        <!-- ===== HERO ===== -->
        <section class="hero-platform container">
            <p class="hero-platform__eyebrow">Knowledge Base</p>

            <h1 class="hero-platform__heading">
                Technical<br>
                <span class="highlight">Insights</span>
            </h1>

            <p class="hero-platform__sub">
                Deep dives, tutorials, and architectural patterns.
                Explore our collection of articles written by industry experts.
            </p>
        </section>

        <!-- ===== ARTICLES LIST ===== -->
        <section class="container" style="padding-top: var(--space-xl); padding-bottom: var(--space-3xl);">
            
            <!-- Category filter -->
            <div class="level-filter" id="categoryFilter">
                <button class="level-filter__btn active" data-filter="all">
                    <i class="bi bi-grid-3x3-gap"></i> All
                </button>
                <button th:each="cat : ${categories}" class="level-filter__btn intermediate" th:attr="data-filter=${cat.slug}">
                    <th:block th:replace="~{partials/fragments :: categoryIcon(${cat.slug})}"></th:block>
                    <span th:text="${cat.name}">Category</span>
                </button>
            </div>

            <ul class="article-grid" id="articlesGrid">
                <li th:each="post : ${data}" class="article-card" th:attr="data-category=${post.category != null ? post.category.slug : 'none'}">
                    <div class="article-card__image-container">
                        <img th:if="${post.imageUrl}" 
                             th:src="${post.imageUrl}" 
                             th:alt="${post.title}" 
                             class="article-card__image"
                             loading="lazy">
                        <div th:unless="${post.imageUrl}" class="article-card__placeholder"></div>
                    </div>
                    <div class="article-card__content">
                        <div class="article-card__meta">
                            <span class="article-card__date" th:text="${#temporals.format(post.createdAt, 'MMMM dd, yyyy')}">Date</span>
                            <span th:if="${post.category}" class="article-card__separator">•</span>
                            <th:block th:replace="~{partials/fragments :: categoryBadge(${post.category}, 'article-card__category')}"></th:block>
                        </div>
                        <h3 class="article-card__title">
                            <a th:href="@{/post/{id}(id=${post.id})}" th:text="${post.title}" class="stretched-link">Post Title</a>
                        </h3>
                        <p class="article-card__excerpt" th:text="${#strings.abbreviate(post.body, 150)}"></p>
                        
                        <div class="article-card__footer">
                            <span class="read-more">read_more <i class="bi bi-arrow-right"></i></span>
                        </div>
                    </div>
                </li>
            </ul>

            <!-- No results (shown by JS filter) -->
            <div id="noResults" style="display:none;" class="text-center py-2xl">
                <i class="bi bi-funnel" style="font-size: 2.5rem; color: var(--text-dim); display: block; margin-bottom: var(--space-m);"></i>
                <p class="text-dim">No articles found in this category.</p>
            </div>

            <!-- Pagination -->
            <div class="pagination" style="margin-top: var(--space-2xl);">
                <a th:if="${currentPage > 1}" 
                   th:href="@{/articles(page=${currentPage - 1})}" 
                   class="pagination-btn">&larr; Newer</a>
                   
                <a th:if="${currentPage < totalPages}" 
                   th:href="@{/articles(page=${currentPage + 1})}" 
                   class="pagination-btn">Older &rarr;</a>
            </div>
        </section>
    </div>

    <!-- Category filter JS -->
    <th:block layout:fragment="scripts">
        <script>
            (function () {
                const filter = document.getElementById('categoryFilter');
                const grid   = document.getElementById('articlesGrid');
                const noRes  = document.getElementById('noResults');
                const pagination = document.querySelector('.pagination');
                if (!filter || !grid) return;

                filter.addEventListener('click', function (e) {
                    const btn = e.target.closest('.level-filter__btn');
                    if (!btn) return;

                    // Update active button
                    filter.querySelectorAll('.level-filter__btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const value = btn.dataset.filter;
                    const cards = grid.querySelectorAll('.article-card');
                    let visible = 0;

                    cards.forEach(function (card) {
                        const cat = card.dataset.category || '';
                        const show  = (value === 'all' || cat === value);
                        card.style.display = show ? 'flex' : 'none';
                        if (show) visible++;
                    });

                    if(noRes) {
                        noRes.style.display = visible === 0 ? 'block' : 'none';
                    }
                    if(pagination) {
                        // Hide pagination when filtering by a specific category (since pagination is server-wide)
                        pagination.style.display = (value === 'all') ? 'flex' : 'none';
                    }
                });
            })();
        </script>
    </th:block>

</body>
</html>
