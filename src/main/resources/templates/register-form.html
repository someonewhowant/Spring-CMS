<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="'Create Account — ' + ${#strings.capitalize(role)}">Register</title>
</head>
<body>
    <div layout:fragment="content" class="fade-in">

        <!-- Animated Background Orbs -->
        <div class="auth-orb auth-orb--blue"></div>
        <div class="auth-orb auth-orb--purple"></div>
        <div class="auth-orb auth-orb--green"></div>

        <div class="auth-wrapper">
            <div class="auth-card">
                <!-- Top glow effect -->
                <div class="auth-card__glow"></div>

                <!-- Header -->
                <div class="auth-header">
                    <div class="auth-header__icon" th:style="${role == 'teacher'} ? 'background: linear-gradient(135deg, rgba(210, 153, 34, 0.15) 0%, rgba(255, 166, 0, 0.15) 100%); color: var(--accent-orange); border-color: rgba(210, 153, 34, 0.15);' : ''">
                        <i th:class="${role == 'teacher'} ? 'bi bi-easel2' : 'bi bi-mortarboard'"></i>
                    </div>
                    <h1 class="auth-header__title">Create Your Account</h1>
                    <p class="auth-header__subtitle">
                        Set up your credentials to get started as
                        <strong th:text="${role == 'teacher'} ? 'a Teacher' : 'a Student'" style="color: var(--text-main);">a Student</strong>
                    </p>
                </div>

                <!-- Error Alert -->
                <div th:if="${error}" class="auth-alert auth-alert--error">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:text="${error}">Error message</span>
                </div>

                <!-- Registration Form -->
                <form th:action="@{'/register/' + ${role}}" method="POST">
                    <div class="auth-input-group">
                        <label class="auth-input-group__label">Username</label>
                        <div class="auth-input-group__field">
                            <input type="text" name="username" placeholder="Choose a username"
                                   class="auth-input-group__input" required autocomplete="username">
                            <i class="bi bi-person auth-input-group__icon"></i>
                        </div>
                    </div>

                    <div class="auth-input-group">
                        <label class="auth-input-group__label">Password</label>
                        <div class="auth-input-group__field">
                            <input type="password" name="password" placeholder="Create a password"
                                   class="auth-input-group__input" required autocomplete="new-password">
                            <i class="bi bi-lock auth-input-group__icon"></i>
                        </div>
                    </div>

                    <div style="margin-top: 28px;">
                        <button type="submit" class="auth-btn auth-btn--primary"
                                th:style="${role == 'teacher'} ? 'background: linear-gradient(135deg, var(--accent-orange) 0%, #ff6e32 100%); box-shadow: 0 4px 15px rgba(210, 153, 34, 0.3);' : ''">
                            <i class="bi bi-check-circle"></i> Create Account
                        </button>
                    </div>
                </form>

                <!-- Footer -->
                <div class="auth-footer">
                    <a th:href="@{/register}" class="auth-link">
                        <i class="bi bi-arrow-left"></i> Choose a different role
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
