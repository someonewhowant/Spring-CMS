<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title th:text="'Register - ' + ${#strings.capitalize(role)}">Register</title>
</head>
<body>
    <div layout:fragment="content" class="fade-in" style="max-width: 480px; margin: 40px auto; padding: 0 var(--space-s);">
        <div class="card-glass" style="padding: clamp(2rem, 5vw, 3.5rem); position: relative; overflow: hidden;">
            <!-- Glow effect background -->
            <div style="position: absolute; top: -50px; left: -50px; width: 150px; height: 150px; background: radial-gradient(circle, rgba(188, 140, 255, 0.08) 0%, transparent 70%); pointer-events: none;"></div>
            
            <div style="text-align: center; margin-bottom: 40px;">
                <div class="header__logo" style="font-size: 2.2rem; margin-bottom: 12px; justify-content: center; float: none;"><span>{</span> code_blog <span>}</span></div>
                <h1 class="text-accent-mono" style="font-size: 1.1rem; letter-spacing: 0.05em; margin: 0; text-transform: uppercase;">
                    <i class="bi bi-person-plus"></i> signup::<span th:text="${role}">role</span>()
                </h1>
                <p style="font-size: 0.85rem; color: var(--text-dim); margin-top: 8px;">Create credentials to initialize cabinet</p>
            </div>
            
            <!-- Error Alert -->
            <div th:if="${error}" class="alert alert-error" style="border-left: 3px solid var(--accent-red); background: rgba(255, 123, 114, 0.05); padding: 12px 16px; border-radius: var(--radius); font-family: var(--font-mono); font-size: 0.8rem; color: #ff7b72; margin-bottom: 24px;" th:text="${error}">
                Error message
            </div>

            <form th:action="@{'/register/' + ${role}}" method="POST">
                <div class="form-group">
                    <label class="form-label" style="color: var(--accent-blue); font-weight: 500;">// CHAR: new_username</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-family: var(--font-mono); font-size: 0.9rem; pointer-events: none;">@</span>
                        <input type="text" name="username" placeholder="developer" class="form-control" style="padding-left: 36px;" required autocomplete="username">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" style="color: var(--accent-purple); font-weight: 500;">// SECURE: access_password</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none;"><i class="bi bi-key-fill" style="font-size: 0.9rem;"></i></span>
                        <input type="password" name="password" placeholder="••••••••" class="form-control" style="padding-left: 36px;" required autocomplete="new-password">
                    </div>
                </div>
                
                <div style="margin-top: 32px;">
                    <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px; font-weight: 600;">
                        <i class="bi bi-check-circle"></i> initialize_user()
                    </button>
                </div>
            </form>
            
            <div style="margin-top: 24px; text-align: center; border-top: 1px solid rgba(48, 54, 61, 0.3); padding-top: 20px;">
                <a th:href="@{/register}" class="btn btn-outline btn-xs" style="border-color: transparent;">
                    <i class="bi bi-arrow-left"></i> change_role()
                </a>
            </div>
        </div>
    </div>
</body>
</html>
