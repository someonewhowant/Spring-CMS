<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
    <title>Register</title>
</head>
<body>
    <div layout:fragment="content" class="login-container" style="max-width: 600px; margin: 0 auto; padding-top: 60px;">
        <div class="card-glass" style="padding: 56px; text-align: center;">
            <div class="login-header" style="margin-bottom: 48px;">
                <div class="header__logo" style="font-size: 2.5rem; margin-bottom: 8px;"><span>{</span> code_blog <span>}</span></div>
                <h1 class="login-subtitle">
                    <i class="bi bi-person-plus"></i> create_account
                </h1>
            </div>
            
            <p style="margin-bottom: 32px; opacity: 0.8;">Выберите ваш тип аккаунта:</p>
            
            <div style="display: flex; gap: 20px; justify-content: center;">
                <a th:href="@{/register/student}" class="btn btn-primary" style="flex: 1; padding: 24px;">
                    <i class="bi bi-mortarboard" style="font-size: 1.5rem; display: block; margin-bottom: 8px;"></i>
                    Я Студент
                </a>
                <a th:href="@{/register/teacher}" class="btn btn-outline" style="flex: 1; padding: 24px; border: 1px solid var(--border-color);">
                    <i class="bi bi-person-badge" style="font-size: 1.5rem; display: block; margin-bottom: 8px;"></i>
                    Я Преподаватель
                </a>
            </div>
            
            <div style="margin-top: 40px;">
                <a th:href="@{/admin/login}" style="opacity: 0.7; text-decoration: none;">Уже есть аккаунт? Войти</a>
            </div>
        </div>
    </div>
</body>
</html>
